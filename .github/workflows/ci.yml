name: CI

on:
  push:
    branches: [master]
    paths: [sdd-cli/**]
  pull_request:
    branches: [master]
    paths: [sdd-cli/**]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdd-cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: sdd-cli/go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test -race -count=1 ./...
