version: "2"

run:
  timeout: 3m

linters:
  enable:
    - noctx
    - tparallel
    - govet
    - errcheck
    - staticcheck
    - unused
    - ineffassign
  settings:
    errcheck:
      exclude-functions:
        - (hash.Hash).Write
        - (io.Writer).Write
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
        - (*os.File).Close
        - (*database/sql.DB).Close
        - (*database/sql.Rows).Close
        - (*github.com/rechedev9/shenronSDD/sdd-cli/internal/store.Store).Close
        - (net/http.ResponseWriter).Write
        - (*html/template.Template).ExecuteTemplate
        - (*net/http.Server).Shutdown
        - os.Remove
  exclusions:
    paths:
      - openspec
    rules:
      - path: _test\.go
        linters:
          - errcheck
          - noctx
